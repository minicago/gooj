<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>提交代码</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 20px; }
      .container { max-width: 900px; margin: 0 auto; }
      textarea { width:100%; box-sizing: border-box; height:320px; font-family: monospace; padding:8px }
      button { padding: 8px 12px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>提交代码</h1>
      <div>
        <div>当前用户：<span id="username"></span></div>
        <div>题目：<span id="problemId"></span></div>
        <div id="limits" style="margin-top:8px;color:#555"></div>
      </div>

      <div style="margin-top:12px">
        <label>C++ 代码</label>
        <textarea id="code">#include <bits/stdc++.h>
using namespace std;
int main(){
    cout<<"hello"<<endl;
    return 0;
}
</textarea>
      </div>
      <div>
        <button id="submitBtn">提交并运行</button>
        <button id="loadLastBtn" style="margin-left:8px">获取上次提交</button>
        <span id="status" style="margin-left:12px"></span>
      </div>

      <h2>运行结果</h2>
      <pre id="result"></pre>
    </div>

    <script>
      function qsGet(name) {
        const u = new URL(location.href);
        return u.searchParams.get(name);
      }
      const username = localStorage.getItem('username') || '';
      const problem = qsGet('problem') || '';
      document.getElementById('username').textContent = username;
      document.getElementById('problemId').textContent = problem;

      async function loadProblem() {
        if (!problem) return;
        try {
          const r = await fetch('/api/problem/' + encodeURIComponent(problem));
          if (!r.ok) return;
          const j = await r.json();
          if (j.config) {
            const cfg = j.config;
            let txt = '';
            if (cfg.time_limit_ms) txt += '时间限制: ' + cfg.time_limit_ms + ' ms; ';
            if (cfg.memory_mb) txt += '内存限制: ' + cfg.memory_mb + ' MB; ';
            document.getElementById('limits').textContent = txt;
          }
        } catch (e) { console.error(e); }
      }

      document.getElementById('submitBtn').addEventListener('click', async () => {
        if (!username) return alert('未登录，请先登录');
        if (!problem) return alert('缺少题目编号');
        const code = document.getElementById('code').value;
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        document.getElementById('status').textContent = '提交中...';
        const res = await fetch('/submit', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ username, problem, code })
        });
        if (!res.ok) { submitBtn.disabled = false; return alert('提交失败'); }
        const j = await res.json();
        const submissionId = j.submission_id || null;
        document.getElementById('status').textContent = j.status || 'queued';
        document.getElementById('result').textContent = '等待评测...';
        const userEnc = encodeURIComponent(username);

        // poll with small initial delay and gradual backoff
        let delay = 600;
        let attempts = 0;
        const maxDelay = 3000;
        const pollOnce = async () => {
          const r = await fetch(`/last_submission?username=${userEnc}&problem=${encodeURIComponent(problem)}`);
          if (!r.ok) return false;
          const data = await r.json();
          if (!data || !data.submission) return false;
          const sub = data.submission;
          // if submissionId provided, ensure it's the same submission (avoid race)
          if (submissionId && sub.ID && Number(sub.ID) !== Number(submissionId)) {
            // not the one yet
            return false;
          }
          if (!sub || sub.Status === 'queued' || sub.Status === 'running') return false;
          // show results
          const results = data.results || [];
          let out = '';
          if (sub.Status === 'compile_error' && sub.Code == null) {
            // fallback if compile error stored differently
          }
          if (sub.Status === 'compile_error' && sub.CompileError) {
            out += 'Compile error:\n' + sub.CompileError + '\n';
          }
          // print per-test results robustly accepting different key casings
          results.forEach(t => {
            const idx = t.TestIndex || t.test_index || t.testIndex || '?';
            const passed = (t.Passed !== undefined) ? (t.Passed ? 'PASS' : 'FAIL') : (t.passed ? (t.passed ? 'PASS' : 'FAIL') : '');
            const timeMs = t.TimeMs || t.time_ms || t.timeMs || 0;
            const memKB = t.MemoryKB || t.memory_kb || t.memoryKB || 0;
            out += `Test ${idx}: ${passed} time_ms=${timeMs} memory_kb=${memKB}\n`;
            if (t.Output) out += 'Output:\n' + t.Output + '\n';
            if (t.Output == null && t.output) out += 'Output:\n' + t.output + '\n';
          });
          document.getElementById('result').textContent = out || '评测完成';
          document.getElementById('status').textContent = sub.Status || sub.status;
          submitBtn.disabled = false;
          return true;
        };

        // loop until finished
        (async function pollLoop(){
          while (true) {
            try {
              const done = await pollOnce();
              if (done) break;
            } catch (e) {}
            attempts++;
            await new Promise(r => setTimeout(r, delay));
            delay = Math.min(maxDelay, Math.floor(delay * 1.3));
          }
        })();
      });

      document.getElementById('loadLastBtn').addEventListener('click', async () => {
        if (!username) return alert('未登录');
        if (!problem) return alert('缺少题目编号');
        const r = await fetch(`/last_submission?username=${encodeURIComponent(username)}&problem=${encodeURIComponent(problem)}`);
        if (!r.ok) return alert('未找到上次提交');
        const j = await r.json();
        if (j.submission && j.submission.code) document.getElementById('code').value = j.submission.code;
        if (j.results) document.getElementById('result').textContent = JSON.stringify(j.results, null, 2);
      });

      loadProblem();
    </script>
  </body>
</html>
