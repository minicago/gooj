<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>题目编辑 - Gooj</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
      .tabs {
        display: flex;
        margin-bottom: 20px;
        border-bottom: 1px solid #ddd;
      }
      .tab {
        padding: 10px 20px;
        cursor: pointer;
        border: 1px solid transparent;
        border-bottom: none;
        margin-right: 5px;
        background: #f5f5f5;
        border-radius: 5px 5px 0 0;
      }
      .tab.active {
        background: white;
        border-color: #ddd;
        border-bottom-color: white;
        font-weight: bold;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .file-upload {
        border: 2px dashed #ccc;
        padding: 20px;
        text-align: center;
        margin: 10px 0;
        border-radius: 5px;
      }
      .file-upload:hover {
        border-color: #007bff;
      }
      .preview-area {
        margin-top: 20px;
      }
      .preview-area h3 {
        margin-bottom: 10px;
      }
      #tuackPreview {
        background: #f9f9f9;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 5px;
        max-height: 500px;
        overflow-y: auto;
        white-space: pre-wrap;
        font-family: monospace;
      }
      .problem-info {
        background: #f5f5f5;
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 20px;
      }
      .problem-info h3 {
        margin-top: 0;
        margin-bottom: 15px;
        color: #333;
      }
      .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
      }
      .info-item {
        background: white;
        padding: 10px;
        border-radius: 4px;
        border: 1px solid #ddd;
      }
      .info-item label {
        display: block;
        font-size: 0.85em;
        color: #666;
        margin-bottom: 5px;
      }
      .info-item input {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
      }
      .info-item input[readonly] {
        background: #f9f9f9;
        color: #666;
      }
      .test-groups {
        margin-top: 15px;
        background: white;
        padding: 15px;
        border-radius: 4px;
        border: 1px solid #ddd;
      }
      .test-groups h4 {
        margin-top: 0;
        margin-bottom: 10px;
        color: #333;
      }
      .test-group-item {
        background: #f9f9f9;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 4px;
        font-size: 0.9em;
      }
      .form-actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      .form-actions button {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div class="manage-container">
      <nav>
        <a href="/problemlist">题目列表</a>
        <a href="/">返回首页</a>
      </nav>
      <h1>题目编辑</h1>

      <div class="card">
        <div class="form-group">
          <label>题目 ID</label>
          <input id="problemID" type="text" placeholder="请输入题目 ID 或通过 URL 参数加载" />
          <button id="loadBtn" class="info" style="margin-left: 10px">加载</button>
        </div>

        <!-- Problem Information Display -->
        <div id="problemInfoSection" class="problem-info" style="display: none;">
          <h3>题目信息</h3>
          <div class="info-grid">
            <div class="info-item">
              <label>题目 ID</label>
              <input type="text" id="infoID" readonly />
            </div>
            <div class="info-item">
              <label>题目名称</label>
              <input type="text" id="infoName" placeholder="题目名称" />
            </div>
            <div class="info-item">
              <label>题目标题</label>
              <input type="text" id="infoTitle" placeholder="题目标题" />
            </div>
            <div class="info-item">
              <label>时间限制 (ms)</label>
              <input type="number" id="infoTimeLimit" placeholder="毫秒" />
            </div>
            <div class="info-item">
              <label>内存限制 (MB)</label>
              <input type="number" id="infoMemLimit" placeholder="MB" />
            </div>
            <div class="info-item">
              <label>测试点数量</label>
              <input type="number" id="infoTestsCount" readonly />
            </div>
          </div>
          
          <div class="test-groups" id="testGroupsSection" style="display: none;">
            <h4>数据分组信息</h4>
            <div id="testGroupsList"></div>
          </div>
        </div>

        <div class="tabs">
          <div class="tab active" data-tab="markdown">编辑 Markdown</div>
          <div class="tab" data-tab="tuack">上传 Tuack</div>
        </div>

        <!-- Markdown Editor Tab -->
        <div id="markdown-tab" class="tab-content active">
          <form id="markdownForm">
            <div class="form-group">
              <label>题面内容 (Markdown)</label>
              <textarea id="markdownEditor" class="code-editor" style="height: 400px" placeholder="请输入或加载题面内容..."></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="success">保存题面</button>
              <button type="button" id="saveAllBtn" class="primary">保存所有更改</button>
            </div>
          </form>
        </div>

        <!-- Tuack Upload Tab -->
        <div id="tuack-tab" class="tab-content">
          <div class="form-group">
            <label>上传 Tuack 压缩包 (.zip)</label>
            <div class="file-upload" id="dropZone">
              <p>拖拽 zip 文件到此处，或点击选择文件</p>
              <input type="file" id="tuackFile" accept=".zip" style="display: none" />
              <p id="fileName" style="font-weight: bold; margin-top: 10px;"></p>
            </div>
            <p style="font-size: 0.9em; color: #666; margin-top: 10px;">
              上传后将自动解压并更新题目文件（题面、测试数据等）
            </p>
          </div>
          <div class="preview-area">
            <h3>处理结果</h3>
            <div id="tuackPreview"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // State
      let currentProblemID = '';
      let currentProblemData = null;

      // URL parameter handling
      function getURLParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
      }

      // Initialize from URL if problem parameter exists
      window.addEventListener('DOMContentLoaded', () => {
        const problemParam = getURLParameter('problem');
        if (problemParam) {
          document.getElementById('problemID').value = problemParam;
          loadProblemData(problemParam);
        }
      });

      // Tab switching
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
        });
      });

      // Load problem data
      async function loadProblemData(problemID) {
        if (!problemID) return;
        try {
          const res = await fetch(`/api/problem/${encodeURIComponent(problemID)}`);
          if (!res.ok) throw new Error('加载失败：' + res.statusText);
          const data = await res.json();
          
          currentProblemID = problemID;
          currentProblemData = data;
          
          // Fill in problem info
          document.getElementById('problemID').value = problemID;
          document.getElementById('infoID').value = data.id || '';
          document.getElementById('infoName').value = data.name || '';
          document.getElementById('infoTitle').value = data.title || '';
          document.getElementById('infoTimeLimit').value = data.time_limit_ms || '';
          document.getElementById('infoMemLimit').value = data.mem_limit_mb || '';
          document.getElementById('infoTestsCount').value = data.tests_count || '';
          document.getElementById('markdownEditor').value = data.statement || '';
          
          // Display test groups
          if (data.config && data.config.test_cases) {
            const testGroupsList = document.getElementById('testGroupsList');
            testGroupsList.innerHTML = '';
            data.config.test_cases.forEach((group, index) => {
              const groupDiv = document.createElement('div');
              groupDiv.className = 'test-group-item';
              const cases = group.cases ? group.cases.join(', ') : '';
              groupDiv.innerHTML = `<strong>分组 ${index + 1}:</strong> 测试点 ${cases} | 分数：${group.score || 0}`;
              testGroupsList.appendChild(groupDiv);
            });
            document.getElementById('testGroupsSection').style.display = 'block';
          } else {
            document.getElementById('testGroupsSection').style.display = 'none';
          }
          
          // Show problem info section
          document.getElementById('problemInfoSection').style.display = 'block';
          
          alert('题目信息加载成功');
        } catch (e) {
          alert('加载题目失败：' + e.message);
        }
      }

      // Load button click handler
      document.getElementById('loadBtn').addEventListener('click', () => {
        const problemID = document.getElementById('problemID').value.trim();
        if (!problemID) return alert('请输入题目 ID');
        loadProblemData(problemID);
      });

      // Markdown form submission (save statement only)
      document.getElementById('markdownForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const problemID = document.getElementById('problemID').value.trim();
        const statement = document.getElementById('markdownEditor').value;
        if (!problemID || !statement) return alert('请输入题目 ID 并加载或输入题面内容');
        try {
          const res = await fetch('/edit/modify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ problem_id: problemID, new_statement: statement })
          });
          if (!res.ok) throw new Error(await res.text());
          alert('题面修改成功');
        } catch (e) {
          alert('修改失败：' + e.message);
        }
      });

      // Save all changes (problem metadata + statement)
      document.getElementById('saveAllBtn').addEventListener('click', async () => {
        const problemID = document.getElementById('problemID').value.trim();
        if (!problemID) return alert('请先加载题目');
        
        const updateData = {
          name: document.getElementById('infoName').value.trim(),
          title: document.getElementById('infoTitle').value.trim(),
          description: document.getElementById('markdownEditor').value,
          time_limit_ms: parseInt(document.getElementById('infoTimeLimit').value) || 0,
          mem_limit_mb: parseInt(document.getElementById('infoMemLimit').value) || 0
        };
        
        if (!updateData.name || !updateData.title) {
          return alert('题目名称和标题不能为空');
        }
        
        try {
          const res = await fetch(`/api/problem/${encodeURIComponent(problemID)}/update`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(updateData)
          });
          if (!res.ok) throw new Error(await res.text());
          const data = await res.json();
          alert('所有更改保存成功！');
          // Reload to show updated data
          await loadProblemData(problemID);
        } catch (e) {
          alert('保存失败：' + e.message);
        }
      });

      // Tuack file handling
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('tuackFile');
      const fileNameDisplay = document.getElementById('fileName');
      const preview = document.getElementById('tuackPreview');

      dropZone.addEventListener('click', () => fileInput.click());

      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#007bff';
      });

      dropZone.addEventListener('dragleave', () => {
        dropZone.style.borderColor = '#ccc';
      });

      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#ccc';
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          handleFile(files[0]);
        }
      });

      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
          handleFile(e.target.files[0]);
        }
      });

      async function handleFile(file) {
        fileNameDisplay.textContent = file.name;
        preview.innerHTML = '<p>正在处理...</p>';

        const problemID = document.getElementById('problemID').value.trim();
        if (!problemID) {
          alert('请先输入题目 ID');
          return;
        }

        // Create FormData to send file
        const formData = new FormData();
        formData.append('file', file);
        formData.append('problem_id', problemID);

        try {
          const res = await fetch('/api/import_tuack', {
            method: 'POST',
            body: formData
          });

          if (!res.ok) {
            const errorText = await res.text();
            throw new Error('导入失败：' + errorText);
          }

          const data = await res.json();
          preview.innerHTML = `<p style="color: green;">导入成功！</p>
            <p>题目名称：${data.name || ''}</p>
            <p>题目标题：${data.title || ''}</p>
            <p>题面已更新，测试数据已导入</p>`;

          // Reload problem data to show updated statement
          await loadProblemData(problemID);
        } catch (e) {
          alert('处理 Tuack 文件失败：' + e.message);
          preview.innerHTML = `<p style="color: red;">处理失败：${e.message}</p>`;
        }
      }
    </script>
  </body>
</html>
