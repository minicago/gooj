<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>登录 - Gooj</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="login-container">
      <h1>欢迎</h1>
      <nav>
        <a href="/problemlist">题目列表</a>
        <a href="/submit">提交页面</a>
        <a href="/postboard">公告板</a>
        <a href="/register">用户注册</a>
      </nav>
      <div class="card">
        <h2>登录</h2>
        <form id="loginForm" class="form-group">
          <label>用户名</label>
          <input id="loginUser" type="text" placeholder="请输入用户名" />
          <label style="margin-top: 16px">密码</label>
          <input id="loginPass" type="password" placeholder="请输入密码" />
          <button id="loginBtn" style="margin-top: 24px; width: 100%">登录</button>
        </form>
      </div>
    </div>

    <script>
      async function postJSON(url, obj) {
        const res = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(obj)});
        if (!res.ok) throw new Error(await res.text());
        return await res.json();
      }
      // auto-redirect if we have a recent login (within 5 minutes)

      (function(){

        function getTokenFromCookie() {
          const match = document.cookie.match(new RegExp('(^| )token=([^;]+)'));
          if (match) return match[2];
          return null;
        }

        const user = localStorage.getItem('username');
        const ts = parseInt(localStorage.getItem('login_ts') || '0', 10);
        const token = getTokenFromCookie() || "";
        if (token != "") {
          // still valid
          location.href = '/problemlist';
        }
      })();

      document.getElementById('loginBtn').addEventListener('click', async ()=>{
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.textContent = '登录中...';

        try{
          const user=document.getElementById('loginUser').value.trim();
          const pass=document.getElementById('loginPass').value;
          if(!user||!pass) {
            alert('请输入用户名和密码');
            btn.disabled = false;
            btn.textContent = '登录';
            return;
          }
          const res = await postJSON('/login',{username:user,password:pass});
          // store username locally and go to problem list; save timestamp for 5min remember
          localStorage.setItem('username', user);
          localStorage.setItem('login_ts', String(Date.now()));
          if (res && res.token) {
            localStorage.setItem('auth_token', res.token);
          }
          // 登录成功，跳转到题目列表
          location.href='/problemlist';
        }catch(e){
          let errorMsg = '登录失败';
          if(e.message.includes('invalid credentials')) {
            errorMsg = '用户名或密码错误';
          } else if(e.message.includes('missing fields')) {
            errorMsg = '请填写完整的登录信息';
          } else if(e.message.includes('internal error')) {
            errorMsg = '服务器内部错误，请稍后重试';
          } else {
            errorMsg = '登录失败: ' + e.message;
          }
          alert(errorMsg);
          btn.disabled = false;
          btn.textContent = '登录';
        }
      });
    </script>
  </body>
</html>
