<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>登录 / 注册</title>
    <style>body{font-family:Arial;padding:20px;max-width:700px;margin:auto}label{display:block;margin-top:8px}</style>
  </head>
  <body>
    <h1>欢迎</h1>
    <div>
      <h2>注册</h2>
      <label>用户名 <input id="regUser" /></label>
      <label>密码 <input id="regPass" type="password" /></label>
      <button id="regBtn">注册</button>
    </div>
    <hr/>
    <div>
      <h2>登录</h2>
      <label>用户名 <input id="loginUser" /></label>
      <label>密码 <input id="loginPass" type="password" /></label>
      <button id="loginBtn">登录</button>
    </div>

    <script>
      async function postJSON(url, obj) {
        const res = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(obj)});
        if (!res.ok) throw new Error(await res.text());
        return await res.json();
      }
      document.getElementById('regBtn').addEventListener('click', async ()=>{
        try{
          const user=document.getElementById('regUser').value.trim();
          const pass=document.getElementById('regPass').value;
          if(!user||!pass) return alert('请输入用户名和密码');
          await postJSON('/register',{username:user,password:pass});
          alert('注册成功，请登录');
        }catch(e){alert('注册失败: '+e.message)}
      });
      // auto-redirect if we have a recent login (within 5 minutes)
      (function(){
        const user = localStorage.getItem('username');
        const ts = parseInt(localStorage.getItem('login_ts') || '0', 10);
        if (user && ts && (Date.now() - ts) < 5*60*1000) {
          // still valid
          location.href = '/problemlist';
        }
      })();

      document.getElementById('loginBtn').addEventListener('click', async ()=>{
        try{
          const user=document.getElementById('loginUser').value.trim();
          const pass=document.getElementById('loginPass').value;
          if(!user||!pass) return alert('请输入用户名和密码');
          await postJSON('/login',{username:user,password:pass});
          // store username locally and go to problem list; save timestamp for 5min remember
          localStorage.setItem('username', user);
          localStorage.setItem('login_ts', String(Date.now()));
          location.href='/problemlist';
        }catch(e){alert('登录失败: '+e.message)}
      });
    </script>
  </body>
</html>
