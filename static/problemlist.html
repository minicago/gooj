<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>题目列表 - Gooj</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="problem-list-container">
      <h1>题目列表</h1>
      <div class="user-info">
        <div>已登录: <span id="who" style="font-weight: 600;"></span></div>
        <button id="logout" class="danger small">登出</button>
      </div>
      <div id="manageUsersOption" style="display:none;margin-bottom:16px">
        <a href="/manage" class="button primary">管理用户</a>
      </div>
      <table>
        <thead><tr><th>ID</th><th>名称</th><th>标题</th><th>通过人数</th><th>我的最高分</th><th>操作</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="pager">
        <button id="prev" class="secondary">上一页</button>
        <span id="pageInfo"></span>
        <button id="next" class="secondary">下一页</button>
      </div>
    </div>

    <script>
      const per = 10
      let page = 1
      document.getElementById('who').textContent = localStorage.getItem('username') || '(未登录)'
      document.getElementById('logout').addEventListener('click', 
        ()=>{
          document.cookie="token=; Max-Age=0; path=/"
          localStorage.removeItem('username')
          location.href='/'
      })

      async function load() {
        const res = await fetch(`/problems?page=${page}&per=${per}`)
        const j = await res.json()
        const tbody = document.getElementById('tbody')
        tbody.innerHTML = ''
        
        // Get current username
        const username = localStorage.getItem('username')
        
        // Load problem stats in parallel
        const problemPromises = j.problems.map(async p => {
          let passedCount = 0
          let userBestScore = 0
          
          try {
            // Get problem stats
            const statsRes = await fetch(`/api/problem_stats?problem=${encodeURIComponent(p.ID)}`)
            if (statsRes.ok) {
              const stats = await statsRes.json()
              passedCount = stats.passed_count || 0
              userBestScore = stats.user_best_score || 0
            }
          } catch (error) {
            console.error(`Error loading stats for problem ${p.ID}:`, error)
          }
          
          return {
            ...p,
            passedCount,
            userBestScore
          }
        })
        
        const problemsWithStats = await Promise.all(problemPromises)
        
        problemsWithStats.forEach(p => {
          const tr = document.createElement('tr')
          tr.innerHTML = `
            <td>${p.ID}</td>
            <td>${p.Name}</td>
            <td>${p.Title||''}</td>
            <td>${p.passedCount}</td>
            <td>${p.userBestScore}</td>
            <td><a href="/problem?id=${encodeURIComponent(p.ID)}">查看题目</a></td>
          `
          tbody.appendChild(tr)
        })
        
        const total = j.total
        const pages = Math.ceil(total / per)
        document.getElementById('pageInfo').textContent = `第 ${page} / ${pages} 页，总 ${total} 道题`

        // Check user permissions for managing users
        if (username) {
          const permRes = await fetch('/api/user_permissions?username=' + encodeURIComponent(username) + "&permission=UserPermission");
          if (permRes.ok) {
            const perms = await permRes.json();
            if (perms.permited) {
              document.getElementById('manageUsersOption').style.display = 'block';
            }
          }
        }
      }
      document.getElementById('prev').addEventListener('click', ()=>{ if(page>1){page--; load()} })
      document.getElementById('next').addEventListener('click', ()=>{ page++; load() })

      load()
    </script>
  </body>
</html>
