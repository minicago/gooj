<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>题目列表</title>
    <style>
      body{font-family:Arial;padding:20px;max-width:900px;margin:auto}
      table{width:100%;border-collapse:collapse}
      th,td{padding:8px;border:1px solid #ddd}
      .pager{margin-top:12px}
    </style>
  </head>
  <body>
    <h1>题目</h1>
    <div>已登录: <span id="who"></span> <button id="logout">登出</button></div>
    <table>
      <thead><tr><th>ID</th><th>名称</th><th>标题</th><th>操作</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="pager">
      <button id="prev">上一页</button>
      <span id="pageInfo"></span>
      <button id="next">下一页</button>
    </div>

    <h2>获取上次提交</h2>
    <label>题目名 <input id="lastProblem" /></label>
    <button id="getLast">获取上次提交和结果</button>
    <pre id="lastResult"></pre>

    <script>
      const per = 10
      let page = 1
      document.getElementById('who').textContent = localStorage.getItem('username') || '(未登录)'
      document.getElementById('logout').addEventListener('click', ()=>{localStorage.removeItem('username'); location.href='/'})

      async function load() {
        const res = await fetch(`/problems?page=${page}&per=${per}`)
        const j = await res.json()
        const tbody = document.getElementById('tbody')
        tbody.innerHTML = ''
        j.problems.forEach(p => {
          const tr = document.createElement('tr')
          tr.innerHTML = `<td>${p.ID}</td><td>${p.Name}</td><td>${p.Title||''}</td><td><a href="/problem?problem=${encodeURIComponent(p.Name)}">查看题目</a></td>`
          tbody.appendChild(tr)
        })
        const total = j.total
        const pages = Math.ceil(total / per)
        document.getElementById('pageInfo').textContent = `第 ${page} / ${pages} 页，总 ${total} 道题`
      }
      document.getElementById('prev').addEventListener('click', ()=>{ if(page>1){page--; load()} })
      document.getElementById('next').addEventListener('click', ()=>{ page++; load() })

      document.getElementById('getLast').addEventListener('click', async ()=>{
        const username = localStorage.getItem('username')
        if(!username) return alert('请先登录')
        const problem = document.getElementById('lastProblem').value.trim()
        if(!problem) return alert('请输入题目名')
        const res = await fetch(`/last_submission?username=${encodeURIComponent(username)}&problem=${encodeURIComponent(problem)}`)
        if(!res.ok) return alert('请求失败')
        const j = await res.json()
        document.getElementById('lastResult').textContent = JSON.stringify(j, null, 2)
      })

      load()
    </script>
  </body>
</html>
