<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>用户管理 - Gooj</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="manage-container">
      <nav>
        <a href="/problemlist">题目列表</a>
        <a href="/submit">提交页面</a>
        <a href="/postboard">公告板</a>
        <a href="/">返回首页</a>
      </nav>
      
      <div class="card">
        <h1>题目管理</h1>
        <table>
          <thead>
            <tr>
              <th>题目ID</th>
              <th>题目标识</th>
              <th>题目标题</th>
              <th>测试用例数</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="problemTable"></tbody>
        </table>
      </div>

      <div class="card">
        <h1>用户管理</h1>
        <table>
          <thead>
            <tr>
              <th>用户名</th>
              <th>用户组</th>
              <th>创建者</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="userTable"></tbody>
        </table>
      </div>

      <div class="card">
        <h2>管理操作</h2>
        <div class="actions">
          <button id="createUser" class="success">创建用户</button>
          <button id="createGroup" class="primary">创建用户组</button>
          <button id="uploadProblem" class="secondary">上传题目</button>
          <button id="manageUsers" class="secondary">用户审核</button>
        </div>
      </div>
    </div>

    <script>
      async function postJSON(url, obj) {
        const res = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(obj)});
        if (!res.ok) throw new Error(await res.text());
        return await res.json();
      }

      async function getJSON(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error(await res.text());
        return await res.json();
      }

      async function loadProblems() {
        try {
          const data = await getJSON('/problems?page=1&per=100');
          const problems = data.problems || [];
          const tbody = document.getElementById('problemTable');
          tbody.innerHTML = '';
          problems.forEach(problem => {
            const tr = document.createElement('tr');
            const problemId = problem.ID || problem.id || '';
            const name = problem.Name || problem.name || '';
            const title = problem.Title || problem.title || '';
            const testsCount = problem.TestsCount || problem.testsCount || 0;
            tr.innerHTML = `
              <td>${problemId}</td>
              <td>${name}</td>
              <td>${title}</td>
              <td>${testsCount}</td>
              <td>
                <button onclick="deleteProblem(${problemId}, '${name}')">删除题目</button>
              </td>
            `;
            tbody.appendChild(tr);
          });
        } catch (e) {
          console.error('加载题目失败:', e);
        }
      }

      async function deleteProblem(problemId, problemName) {
        if (!confirm(`确定要删除题目 ${problemName} (ID: ${problemId}) 吗？此操作不可恢复。`)) return;
        try {
          await postJSON('/api/delete_problem', { problem_id: problemId });
          alert('题目已删除');
          loadProblems();
        } catch (e) {
          alert('删除题目失败: ' + e.message);
        }
      }

      async function loadUsers() {
        try {
          const res = await fetch('/api/users');
          if (!res.ok) {
            const errorText = await res.text();
            console.error('加载用户失败:', res.status, errorText);
            alert('加载用户失败: ' + (errorText || res.statusText));
            return;
          }
          const data = await res.json();
          
          // data 结构 {total: 10, users: [...]}
          const users = data.users || [];
          const total = data.total || 0;
          
          const tbody = document.getElementById('userTable');
          tbody.innerHTML = '';
          
          if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">暂无用户</td></tr>';
            return;
          }
          
          users.forEach(user => {
            const tr = document.createElement('tr');
            // JSON from Go exports fields with capitalized names (Username, GroupName, CreatedBy)
            const username = user.Username || user.username || '';
            const groupName = user.GroupName || (user.Group && (user.Group.Name || user.Group.name)) || '';
            const createdBy = user.CreatedBy || user.createdBy || '';
            tr.innerHTML = `
              <td>${username}</td>
              <td>${groupName}</td>
              <td>${createdBy}</td>
              <td>
                <button onclick="resetPassword('${username}')">重置密码</button>
                <button onclick="deleteUser('${username}')">删除用户</button>
              </td>
            `;
            tbody.appendChild(tr);
          });
        } catch (error) {
          console.error('加载用户时发生错误:', error);
          alert('加载用户时发生错误: ' + error.message);
        }
      }

      async function resetPassword(username) {
        if (!confirm(`确定要重置用户 ${username} 的密码吗？`)) return;
        try {
          const res = await postJSON('/api/reset_password', { username });
          alert(`密码已重置，新密码: ${res.password}`);
        } catch (e) {
          alert('重置密码失败: ' + e.message);
        }
      }

      async function deleteUser(username) {
        if (!confirm(`确定要删除用户 ${username} 吗？此操作不可恢复。`)) return;
        try {
          await postJSON('/api/delete_user', { username });
          alert('用户已删除');
          loadUsers();
        } catch (e) {
          alert('删除用户失败: ' + e.message);
        }
      }

      document.getElementById('createUser').addEventListener('click', () => {
        location.href = '/create_user';
      });

      document.getElementById('createGroup').addEventListener('click', () => {
        location.href = '/create_group';
      });

      document.getElementById('uploadProblem').addEventListener('click', () => {
        location.href = '/upload_problem';
      });

      document.getElementById('manageUsers').addEventListener('click', () => {
        location.href = '/manage_users';
      });

      loadUsers();
      loadProblems();
    </script>
  </body>
</html>
