<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>用户管理</title>
    <style>body{font-family:Arial;padding:20px;max-width:700px;margin:auto}label{display:block;margin-top:8px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:8px;text-align:left}th{background-color:#f2f2f2}</style>
  </head>
  <body>
    <h1>用户管理</h1>
    <table>
      <thead>
        <tr>
          <th>用户名</th>
          <th>密码</th>
          <th>用户组</th>
          <th>权限</th>
        </tr>
      </thead>
      <tbody id="userTable"></tbody>
    </table>

    <div class="actions">
      <button id="createUser">创建用户</button>
      <button id="createGroup">创建用户组</button>
    </div>

    <script>
      async function postJSON(url, obj) {
        const res = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(obj)});
        if (!res.ok) throw new Error(await res.text());
        return await res.json();
      }

      async function loadUsers() {
        const res = await fetch('/api/users');
        if (!res.ok) {
          alert('加载用户失败');
          return;
        }
        const users = await res.json();
        const tbody = document.getElementById('userTable');
        tbody.innerHTML = '';
        users.forEach(user => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${user.username}</td>
            <td>${user.password}</td>
            <td>${user.group}</td>
            <td>${user.permissions}</td>
          `;
          tbody.appendChild(tr);
        });
      }

      document.getElementById('createUser').addEventListener('click', () => {
        location.href = '/create_user';
      });

      document.getElementById('createGroup').addEventListener('click', () => {
        location.href = '/create_group';
      });

      loadUsers();
    </script>
  </body>
</html>
