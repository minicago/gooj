<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>创建用户 - Gooj</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="manage-container">
      <nav>
        <a href="/manage">返回管理</a>
      </nav>
      <h1>创建用户</h1>
      <div class="card">
        <form id="createUserForm">
          <div class="form-group">
            <label>用户名</label>
            <input id="username" type="text" placeholder="请输入用户名" />
          </div>
          <div class="form-group">
            <label>选择用户组</label>
            <select id="userGroup">
              <option value="">加载中...</option>
            </select>
          </div>
          <button id="createUserBtn" class="success" style="width: 100%">创建用户</button>
        </form>
      </div>
    </div>

    <script>
      async function postJSON(url, obj) {
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(obj) });
        if (!res.ok) throw new Error(await res.text());
        return await res.json();
      }

      async function loadGroups() {
        const res = await fetch('/api/groups');
        if (!res.ok) {
          alert('加载用户组失败');
          return;
        }
        const data = await res.json();
        const groups = data.groups || [];
        const select = document.getElementById('userGroup');
        select.innerHTML = '<option value="">请选择用户组</option>';
        groups.forEach(group => {
          const option = document.createElement('option');
          // Go JSON exports struct fields capitalized (Name)
          option.value = group.Name || group.name || '';
          option.textContent = group.Name || group.name || '';
          select.appendChild(option);
        });
      }

      document.getElementById('createUserBtn').addEventListener('click', async () => {
        try {
          const username = document.getElementById('username').value.trim();
          const group = document.getElementById('userGroup').value;
          if (!username || !group) return alert('请输入用户名并选择用户组');

          const res = await postJSON('/api/create_user', { username, group });
          alert(`用户创建成功，密码: ${res.password}`);
          location.href = '/manage';
        } catch (e) {
          alert('创建失败: ' + e.message);
        }
      });

      loadGroups();
    </script>
  </body>
</html>
