<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>题目 - Gooj</title>
    <link rel="stylesheet" href="/static/style.css" />
    <!-- KaTeX CSS for LaTeX rendering -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/katex.min.css" crossorigin="anonymous">
  </head>
  <body>
    <div class="container">
      <nav>
        <a href="/problemlist">题目列表</a>
        <a href="/submit">提交页面</a>
        <a href="/postboard">公告板</a>
        <a href="/">返回首页</a>
      </nav>
      <h1 id="title">题目</h1>
      <div id="limits"></div>
      <div class="card">
        <h2>题面</h2>
        <div id="statement"></div>
      </div>
      <div class="actions">
        <a id="toSubmit" href="#" class="button primary">去提交此题</a>
        <span id="editOption" style="display:none">
          <a href="#" id="editProblem" class="button secondary">编辑题目</a>
        </span>
      </div>
    </div>

    <!-- KaTeX JS for LaTeX rendering - load before custom script -->
    <script src="https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/katex.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js" crossorigin="anonymous"></script>

    <script>
      function qsGet(name) { const u=new URL(location.href); return u.searchParams.get(name); }
      const id = qsGet('id') || '1';
      document.getElementById('title').textContent = '题目 ' + id;
      async function load(){
        const r = await fetch('/api/problem/' + encodeURIComponent(id));
        if (!r.ok) { document.getElementById('statement').textContent = '加载失败'; return; }
        const j = await r.json();
        // prefer server-rendered HTML when available
        if (j.statement_html) {
          document.getElementById('statement').innerHTML = j.statement_html;
        } else {
          document.getElementById('statement').textContent = j.statement || '';
        }
        if (j.config) {
          const cfg = j.config;
          let txt = '';
          if (cfg.time_limit_ms) txt += '时间限制: ' + cfg.time_limit_ms + ' ms; ';
          if (cfg.memory_mb) txt += '内存限制: ' + cfg.memory_mb + ' MB; ';
          document.getElementById('limits').textContent = txt;
        }
        document.getElementById('toSubmit').href = '/submit?id=' + encodeURIComponent(id);

        // Render LaTeX using KaTeX
        if (typeof renderMathInElement !== 'undefined') {
          renderMathInElement(document.getElementById('statement'), {
            delimiters: [
              {left: '$$', right: '$$', display: true},
              {left: '$', right: '$', display: false},
              {left: '\\(', right: '\\)', display: false},
              {left: '\\[', right: '\\]', display: true}
            ],
            throwOnError: false
          });
        } else {
          console.error('KaTeX auto-render not loaded');
        }

        // Check user permissions for editing
        const user = localStorage.getItem('username');
        if (user) {
          const permRes = await fetch('/api/user_permissions?username=' + encodeURIComponent(user) + "&permission=EditPermission");
          if (permRes.ok) {
            const perms = await permRes.json();
            if (perms.permited) {
              document.getElementById('editOption').style.display = 'inline';
              document.getElementById('editProblem').href = '/edit?problem=' + encodeURIComponent(id);
            }
          }
        }
      }
      load();
    </script>
  </body>
</html>
