<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>在线评测 - Gooj</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="submit-container">
      <nav>
        <a href="/problemlist">题目列表</a>
        <a href="/postboard">公告板</a>
        <a href="/">返回首页</a>
      </nav>
      <h1>提交代码</h1>
      <div class="card">
        <div class="row">
          <div class="col">
            <label>题目</label>
            <select id="problemSelect"></select>
          </div>
          <div class="col">
            <label>用户名</label>
            <input id="username" type="text" placeholder="输入用户名" />
          </div>
        </div>
      </div>

      <div class="card">
        <h2>C++ 代码</h2>
        <textarea id="code" class="code-editor">#include <bits/stdc++.h>
using namespace std;
int main(){
    cout<<"hello"<<endl;
    return 0;
}
</textarea>
      </div>
      <div class="actions">
        <button id="submitBtn" class="success">提交并运行</button>
        <button id="loadLastBtn" class="secondary">获取上次提交</button>
        <span id="status"></span>
      </div>

      <div class="card">
        <h2>运行结果</h2>
        <div id="result" class="result-preview"></div>
      </div>
    </div>

    <script>
      async function loadProblems() {
        try {
          const res = await fetch('/problems');
          if (!res.ok) return;
          const list = await res.json();
          const sel = document.getElementById('problemSelect');
          // expecting list to be an array of problem names or objects
          if (Array.isArray(list)) {
            list.forEach(p => {
              const opt = document.createElement('option');
              if (typeof p === 'string') {
                opt.value = p; opt.textContent = p;
              } else if (p.name) {
                opt.value = p.name; opt.textContent = p.name + (p.title?(' - '+p.title):'');
              }
              sel.appendChild(opt);
            });
          }
        } catch (e) { console.error(e); }
      }

      document.getElementById('submitBtn').addEventListener('click', async () => {
        const username = document.getElementById('username').value.trim();
        const problem = document.getElementById('problemSelect').value;
        const code = document.getElementById('code').value;
        if (!username) return alert('请输入用户名');
        if (!problem) return alert('请选择题目');
        document.getElementById('status').textContent = '提交中...';
        const res = await fetch('/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, problem, code })
        });
        const j = await res.json();
        document.getElementById('status').textContent = j.status || 'queued';
        // poll for result
        const user = encodeURIComponent(username);
        document.getElementById('result').textContent = '等待评测...';
        const poll = async () => {
          const r = await fetch(`/result/${user}/${problem}`);
          if (!r.ok) return false;
          const text = await r.text();
          if (!text) return false;
          document.getElementById('result').textContent = text;
          document.getElementById('status').textContent = 'done';
          return true;
        };
        // try immediately then every 1s until got
        if (await poll()) return;
        const iv = setInterval(async () => {
          try {
            if (await poll()) {
              clearInterval(iv);
            }
          } catch (e) {
            // ignore
          }
        }, 1000);
      });

      document.getElementById('loadLastBtn').addEventListener('click', async () => {
        const username = document.getElementById('username').value.trim();
        const problem = document.getElementById('problemSelect').value;
        if (!username) return alert('请输入用户名');
        if (!problem) return alert('请选择题目');
        const user = encodeURIComponent(username);
        const r = await fetch(`/codefile/${user}/${problem}`);
        if (!r.ok) return alert('没有找到上次提交');
        const j = await r.json();
        if (j.code) document.getElementById('code').value = j.code;
        if (j.result) document.getElementById('result').textContent = j.result;
      });

      loadProblems();
    </script>
  </body>
</html>
